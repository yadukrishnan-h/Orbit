name: orbit
description: "Orbit — SSH & SFTP server management app."
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Blocked at 2.x: isar_generator 3.x transitive deps (build ^2.3.0,
  # source_gen ^1.2.2, test <1.16) are incompatible with riverpod 3.x.
  # Upgrade flutter_riverpod → 3.x when isar 4.x reaches stable.
  flutter_riverpod: ^2.6.1
  go_router: ^17.1.0
  flutter_secure_storage: ^10.0.0
  dartssh2: ^2.10.1
  lucide_icons: ^0.257.0
  path_provider: ^2.1.3
  fl_chart: ^1.1.1
  uuid: ^4.5.3
  freezed_annotation: ^2.4.4
  isar: ^3.1.0+1
  google_fonts: ^8.0.2
  isar_flutter_libs: ^3.1.0+1
  intl: ^0.20.2
  file_picker: ^10.3.10
  share_plus: ^12.0.1
  json_annotation: ^4.9.0
  local_auth: ^3.0.1
  shared_preferences: ^2.3.2
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # build_runner, freezed, mockito, json_serializable all blocked by
  # isar_generator 3.x transitive constraints.
  build_runner: ^2.4.0
  freezed: ^2.5.2
  mockito: ^5.4.4
  mocktail: ^1.0.4
  isar_generator: ^3.1.0+1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
