name: orbit
description: "Orbit — SSH & SFTP server management app."
publish_to: "none"
version: 1.1.1+5

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Migrated to Hive to unblock transitive dependency constraints.
  flutter_riverpod: ^3.0.0
  go_router: ^17.1.0
  flutter_secure_storage: ^10.0.0
  dartssh2: ^2.10.1
  lucide_icons: ^0.257.0
  path_provider: ^2.1.3
  fl_chart: ^1.1.1
  uuid: ^4.5.3
  freezed_annotation: ^3.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^8.0.2
  intl: ^0.20.2
  file_picker: ^11.0.0
  share_plus: ^13.0.0
  json_annotation: ^4.11.0
  local_auth: ^3.0.1
  shared_preferences: ^2.3.2
  connectivity_plus: ^7.0.0
  in_app_update: ^4.2.5
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  flutter_markdown: ^0.7.7+1
  xterm: 4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^3.0.1
  mockito: ^5.4.4
  mocktail: ^1.0.4
  json_serializable: ^6.9.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - PRIVACY_POLICY.md
    - TERMS_OF_SERVICE.md
